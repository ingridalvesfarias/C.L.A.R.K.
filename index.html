<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C.L.A.R.K. — AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --cyan: #00f5ff;
      --cyan-dim: #00b8c8;
      --pink: #ff2d78;
      --blue: #0a1628;
      --dark: #050d1a;
      --darker: #020810;
      --glow-cyan: 0 0 10px #00f5ff, 0 0 30px #00f5ff66, 0 0 60px #00f5ff33;
      --glow-pink: 0 0 10px #ff2d78, 0 0 30px #ff2d7866;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--darker);
      color: var(--cyan);
      font-family: 'Share Tech Mono', monospace;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg,
          transparent,
          transparent 2px,
          rgba(0, 245, 255, 0.015) 2px,
          rgba(0, 245, 255, 0.015) 4px);
      pointer-events: none;
      z-index: 1000;
    }

    /* Grid bg */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 245, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 245, 255, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* TOP BAR */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 1px solid rgba(0, 245, 255, 0.2);
      background: rgba(0, 10, 20, 0.9);
      position: relative;
      z-index: 10;
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Orbitron', monospace;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 6px;
      text-shadow: var(--glow-cyan);
      color: var(--cyan);
    }

    .logo span {
      color: var(--pink);
      text-shadow: var(--glow-pink);
    }

    .status-bar {
      display: flex;
      gap: 20px;
      font-size: 11px;
      color: var(--cyan-dim);
    }

    .status-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: var(--glow-cyan);
      animation: pulse 2s infinite;
      margin-right: 5px;
    }

    .status-dot.offline {
      background: #ff4444;
      box-shadow: 0 0 10px #ff4444;
      animation: none;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    .time-display {
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      color: var(--cyan);
      text-shadow: var(--glow-cyan);
    }

    /* MAIN LAYOUT */
    .main-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    /* LEFT PANEL — CLARK IMAGE */
    .clark-panel {
      width: 340px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      border-right: 1px solid rgba(0, 245, 255, 0.15);
      background: rgba(0, 5, 15, 0.5);
      position: relative;
    }

    .clark-avatar-wrap {
      position: relative;
      width: 260px;
      height: 260px;
    }

    /* Rotating ring */
    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid transparent;
      animation: spin linear infinite;
    }

    .ring-1 {
      inset: -15px;
      border-top-color: var(--cyan);
      border-right-color: var(--cyan);
      box-shadow: 0 0 15px rgba(0, 245, 255, 0.3);
      animation-duration: 4s;
    }

    .ring-2 {
      inset: -28px;
      border-bottom-color: var(--pink);
      border-left-color: var(--pink);
      box-shadow: 0 0 15px rgba(255, 45, 120, 0.3);
      animation-duration: 7s;
      animation-direction: reverse;
    }

    .ring-3 {
      inset: -42px;
      border-top-color: rgba(0, 245, 255, 0.4);
      border-right-color: rgba(0, 245, 255, 0.4);
      animation-duration: 12s;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .clark-img {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(0, 245, 255, 0.4);
      box-shadow:
        0 0 30px rgba(0, 245, 255, 0.3),
        0 0 60px rgba(0, 245, 255, 0.15),
        inset 0 0 30px rgba(0, 245, 255, 0.1);
      transition: box-shadow 0.3s;
    }

    .clark-img.speaking {
      box-shadow:
        0 0 40px rgba(0, 245, 255, 0.7),
        0 0 80px rgba(0, 245, 255, 0.4),
        0 0 120px rgba(0, 245, 255, 0.2),
        inset 0 0 30px rgba(0, 245, 255, 0.2);
      animation: speakPulse 0.5s ease-in-out infinite alternate;
    }

    @keyframes speakPulse {
      from {
        box-shadow: 0 0 40px rgba(0, 245, 255, 0.7), 0 0 80px rgba(0, 245, 255, 0.4);
      }

      to {
        box-shadow: 0 0 60px rgba(0, 245, 255, 1), 0 0 120px rgba(0, 245, 255, 0.6);
      }
    }

    .clark-name {
      margin-top: 28px;
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 900;
      letter-spacing: 8px;
      text-shadow: var(--glow-cyan);
      color: var(--cyan);
    }

    .clark-subtitle {
      font-size: 9px;
      letter-spacing: 2px;
      color: rgba(0, 245, 255, 0.5);
      text-align: center;
      margin-top: 6px;
      line-height: 1.6;
    }

    /* Sound wave bars */
    .sound-wave {
      display: flex;
      align-items: center;
      gap: 3px;
      margin-top: 18px;
      height: 30px;
    }

    .bar {
      width: 3px;
      background: var(--cyan);
      border-radius: 2px;
      box-shadow: 0 0 6px var(--cyan);
      transform-origin: bottom;
      animation: wave 1.2s ease-in-out infinite;
      opacity: 0.3;
    }

    .sound-wave.active .bar {
      opacity: 1;
    }

    .bar:nth-child(1) {
      animation-delay: 0s;
    }

    .bar:nth-child(2) {
      animation-delay: 0.1s;
    }

    .bar:nth-child(3) {
      animation-delay: 0.2s;
    }

    .bar:nth-child(4) {
      animation-delay: 0.3s;
    }

    .bar:nth-child(5) {
      animation-delay: 0.4s;
    }

    .bar:nth-child(6) {
      animation-delay: 0.3s;
    }

    .bar:nth-child(7) {
      animation-delay: 0.2s;
    }

    .bar:nth-child(8) {
      animation-delay: 0.1s;
    }

    .bar:nth-child(9) {
      animation-delay: 0s;
    }

    @keyframes wave {

      0%,
      100% {
        height: 4px;
      }

      50% {
        height: 24px;
      }
    }

    /* Side panel actions */
    .panel-actions {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .btn-side {
      background: transparent;
      border: 1px solid rgba(0, 245, 255, 0.2);
      color: var(--cyan-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      padding: 8px 16px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .btn-side:hover {
      border-color: var(--cyan);
      color: var(--cyan);
      box-shadow: 0 0 10px rgba(0, 245, 255, 0.2);
      background: rgba(0, 245, 255, 0.05);
    }

    .btn-side.danger:hover {
      border-color: var(--pink);
      color: var(--pink);
      box-shadow: var(--glow-pink);
    }

    /* RIGHT — CHAT */
    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .chat-messages::-webkit-scrollbar {
      width: 4px;
    }

    .chat-messages::-webkit-scrollbar-track {
      background: transparent;
    }

    .chat-messages::-webkit-scrollbar-thumb {
      background: rgba(0, 245, 255, 0.3);
      border-radius: 2px;
    }

    /* Messages */
    .msg {
      display: flex;
      gap: 12px;
      animation: fadeIn 0.3s ease;
      max-width: 90%;
    }

    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .msg.clark {
      align-self: flex-start;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(0, 245, 255, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-family: 'Orbitron', monospace;
      flex-shrink: 0;
      color: var(--cyan);
      background: rgba(0, 245, 255, 0.07);
    }

    .msg.user .msg-avatar {
      background: rgba(255, 45, 120, 0.1);
      border-color: rgba(255, 45, 120, 0.4);
      color: var(--pink);
    }

    .msg-body {
      background: rgba(0, 245, 255, 0.04);
      border: 1px solid rgba(0, 245, 255, 0.15);
      padding: 12px 16px;
      font-size: 13px;
      line-height: 1.6;
      color: rgba(200, 240, 255, 0.9);
      position: relative;
      max-width: 100%;
    }

    .msg.user .msg-body {
      background: rgba(255, 45, 120, 0.05);
      border-color: rgba(255, 45, 120, 0.15);
      color: rgba(255, 200, 220, 0.9);
    }

    .msg-body pre {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(0, 245, 255, 0.15);
      border-left: 3px solid var(--cyan);
      padding: 12px;
      margin: 10px 0;
      overflow-x: auto;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: #a8f0ff;
    }

    .msg-body code {
      background: rgba(0, 245, 255, 0.08);
      padding: 2px 6px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--cyan);
      border: 1px solid rgba(0, 245, 255, 0.2);
    }

    .msg-body pre code {
      background: none;
      padding: 0;
      border: none;
    }

    .msg-time {
      font-size: 9px;
      color: rgba(0, 245, 255, 0.3);
      margin-top: 4px;
    }

    .msg.user .msg-time {
      text-align: right;
    }

    /* Typing indicator */
    .typing-indicator {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 12px 16px;
      background: rgba(0, 245, 255, 0.04);
      border: 1px solid rgba(0, 245, 255, 0.15);
      width: fit-content;
    }

    .typing-indicator.visible {
      display: flex;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--cyan);
      animation: typingPulse 1.4s ease-in-out infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typingPulse {

      0%,
      80%,
      100% {
        opacity: 0.2;
        transform: scale(0.8);
      }

      40% {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* INPUT AREA */
    .input-area {
      padding: 16px 20px;
      border-top: 1px solid rgba(0, 245, 255, 0.15);
      background: rgba(0, 5, 15, 0.8);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    #user-input {
      width: 100%;
      background: rgba(0, 245, 255, 0.04);
      border: 1px solid rgba(0, 245, 255, 0.25);
      color: var(--cyan);
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      padding: 12px 16px;
      resize: none;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      min-height: 46px;
      max-height: 120px;
      line-height: 1.5;
    }

    #user-input::placeholder {
      color: rgba(0, 245, 255, 0.2);
    }

    #user-input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 10px rgba(0, 245, 255, 0.15);
    }

    .btn {
      background: transparent;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      padding: 12px 16px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.2s;
      text-transform: uppercase;
      white-space: nowrap;
      height: 46px;
    }

    .btn:hover {
      background: rgba(0, 245, 255, 0.1);
      box-shadow: var(--glow-cyan);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-mic {
      border-color: var(--pink);
      color: var(--pink);
      width: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .btn-mic:hover {
      background: rgba(255, 45, 120, 0.1);
      box-shadow: var(--glow-pink);
    }

    .btn-mic.listening {
      background: rgba(255, 45, 120, 0.15);
      box-shadow: var(--glow-pink);
      animation: micPulse 1s ease-in-out infinite;
    }

    @keyframes micPulse {

      0%,
      100% {
        box-shadow: var(--glow-pink);
      }

      50% {
        box-shadow: 0 0 20px #ff2d78, 0 0 50px #ff2d7888;
      }
    }

    .mic-icon {
      font-size: 18px;
    }

    /* Welcome msg */
    .welcome-msg {
      text-align: center;
      padding: 30px 20px;
      color: rgba(0, 245, 255, 0.3);
      font-size: 12px;
      letter-spacing: 1px;
      line-height: 2;
    }

    .welcome-msg h2 {
      font-family: 'Orbitron', monospace;
      font-size: 16px;
      color: rgba(0, 245, 255, 0.6);
      letter-spacing: 4px;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(0, 245, 255, 0.4);
    }

    /* Corner decorations */
    .corner {
      position: absolute;
      width: 16px;
      height: 16px;
    }

    .corner-tl {
      top: 4px;
      left: 4px;
      border-top: 1px solid var(--cyan);
      border-left: 1px solid var(--cyan);
    }

    .corner-tr {
      top: 4px;
      right: 4px;
      border-top: 1px solid var(--cyan);
      border-right: 1px solid var(--cyan);
    }

    .corner-bl {
      bottom: 4px;
      left: 4px;
      border-bottom: 1px solid var(--cyan);
      border-left: 1px solid var(--cyan);
    }

    .corner-br {
      bottom: 4px;
      right: 4px;
      border-bottom: 1px solid var(--cyan);
      border-right: 1px solid var(--cyan);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 80px;
      right: 20px;
      background: rgba(0, 10, 20, 0.95);
      border: 1px solid var(--cyan);
      color: var(--cyan);
      font-size: 11px;
      padding: 10px 16px;
      letter-spacing: 1px;
      z-index: 1000;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Scrollbar for chat */
    .chat-messages {
      scroll-behavior: smooth;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .clark-panel {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="logo">C.L.A.R.<span>K</span></div>
    <div class="status-bar">
      <span><span class="status-dot" id="dot-groq"></span>GROQ</span>
      <span><span class="status-dot" id="dot-weather"></span>WEATHER</span>
      <span><span class="status-dot" id="dot-search"></span>SEARCH</span>
    </div>
    <div class="time-display" id="clock">00:00</div>
  </div>

  <!-- MAIN -->
  <div class="main-layout">

    <!-- LEFT: CLARK -->
    <div class="clark-panel">
      <div class="clark-avatar-wrap">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
        <img src="clark-img.png" alt="C.L.A.R.K." class="clark-img" id="clark-img">
      </div>
      <div class="clark-name">C.L.A.R.K.</div>
      <div class="clark-subtitle">COGNITIVE LEARNING ASSISTANT<br>FOR REMARKABLE KNOWLEDGE</div>

      <div class="sound-wave" id="sound-wave">
        <div class="bar" style="height:4px"></div>
        <div class="bar" style="height:8px"></div>
        <div class="bar" style="height:14px"></div>
        <div class="bar" style="height:20px"></div>
        <div class="bar" style="height:24px"></div>
        <div class="bar" style="height:20px"></div>
        <div class="bar" style="height:14px"></div>
        <div class="bar" style="height:8px"></div>
        <div class="bar" style="height:4px"></div>
      </div>

      <div class="panel-actions">
        <button class="btn-side" onclick="suggestProject()">💡 SUGERIR PROJETO</button>
        <button class="btn-side" onclick="quickHelp('explique o que é React e quando usar')">⚛️ O QUE É REACT?</button>
        <button class="btn-side" onclick="quickHelp('me dê dicas de roadmap para ser dev fullstack')">🗺️ ROADMAP
          DEV</button>
        <button class="btn-side danger" onclick="resetChat()">⚠️ RESETAR MEMÓRIA</button>
      </div>
    </div>

    <!-- RIGHT: CHAT -->
    <div class="chat-panel">
      <div class="chat-messages" id="chat-messages">
        <div class="welcome-msg">
          <h2>⚡ SISTEMA ONLINE ⚡</h2>
          C.L.A.R.K. está pronto para ajudar, chefe.<br>
          Pode falar, digitar ou usar o microfone.<br>
          <span style="color:rgba(255,45,120,0.5)">[ MODO: ASSISTENTE DE PROGRAMAÇÃO ]</span>
        </div>
      </div>

      <div style="padding: 0 20px 10px;">
        <div class="typing-indicator" id="typing">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <span style="font-size:11px;color:rgba(0,245,255,0.4);margin-left:4px;">C.L.A.R.K. processando...</span>
        </div>
      </div>

      <div class="input-area">
        <button class="btn btn-mic" id="mic-btn" onclick="toggleMic()" title="Falar">
          <span class="mic-icon">🎙️</span>
        </button>
        <div class="input-wrap">
          <textarea id="user-input" rows="1" placeholder="Digite sua mensagem ou clique no microfone..."
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="btn" onclick="sendMessage()">ENVIAR</button>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ==================== CLOCK ====================
    function updateClock() {
      const now = new Date();
      const h = String(now.getHours()).padStart(2, '0');
      const m = String(now.getMinutes()).padStart(2, '0');
      const s = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock').textContent = `${h}:${m}:${s}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ==================== STATUS ====================
    async function checkStatus() {
      try {
        const r = await fetch('/api/status');
        const data = await r.json();
        setDot('dot-groq', data.groq);
        setDot('dot-weather', data.weather);
        setDot('dot-search', data.search);
      } catch (e) { }
    }

    function setDot(id, online) {
      const el = document.getElementById(id);
      if (online) { el.classList.remove('offline'); }
      else { el.classList.add('offline'); }
    }

    checkStatus();

    // ==================== MARKDOWN RENDERER ====================
    function renderMarkdown(text) {
      // Code blocks
      text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
        return `<pre><code>${escapeHtml(code.trim())}</code></pre>`;
      });
      // Inline code
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
      // Bold
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      // Italic
      text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
      // Headers
      text = text.replace(/^### (.+)$/gm, '<strong style="color:var(--cyan);font-size:14px;">$1</strong>');
      text = text.replace(/^## (.+)$/gm, '<strong style="color:var(--cyan);font-size:15px;">$1</strong>');
      text = text.replace(/^# (.+)$/gm, '<strong style="color:var(--cyan);font-size:16px;">$1</strong>');
      // Lists
      text = text.replace(/^[-*] (.+)$/gm, '<span style="color:var(--cyan)">▸</span> $1');
      // Numbered lists
      text = text.replace(/^\d+\. (.+)$/gm, '<span style="color:var(--cyan-dim)">→</span> $1');
      // Line breaks
      text = text.replace(/\n/g, '<br>');
      return text;
    }

    function escapeHtml(t) {
      return t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ==================== CHAT ====================
    function addMessage(role, text, time) {
      const messages = document.getElementById('chat-messages');
      const msg = document.createElement('div');
      msg.className = `msg ${role}`;

      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = role === 'user' ? 'EU' : 'CK';

      const bodyWrap = document.createElement('div');

      const body = document.createElement('div');
      body.className = 'msg-body';
      body.innerHTML = renderMarkdown(text);

      const timeEl = document.createElement('div');
      timeEl.className = 'msg-time';
      timeEl.textContent = time || new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

      bodyWrap.appendChild(body);
      bodyWrap.appendChild(timeEl);

      msg.appendChild(avatar);
      msg.appendChild(bodyWrap);
      messages.appendChild(msg);
      messages.scrollTop = messages.scrollHeight;
    }

    function setTyping(show) {
      document.getElementById('typing').classList.toggle('visible', show);
    }

    async function sendMessage() {
      const input = document.getElementById('user-input');
      const text = input.value.trim();
      if (!text) return;

      addMessage('user', text);
      input.value = '';
      input.style.height = 'auto';
      setTyping(true);

      try {
        const r = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text })
        });
        const data = await r.json();
        setTyping(false);

        if (data.error) {
          addMessage('clark', `⚠️ Erro: ${data.error}`, data.timestamp);
        } else {
          addMessage('clark', data.response, data.timestamp);
          speakText(data.response);
        }
      } catch (e) {
        setTyping(false);
        addMessage('clark', '⚠️ Falha na conexão com o servidor.', '');
      }
    }

    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    }

    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    // ==================== TTS ====================
    async function speakText(text) {
      const img = document.getElementById('clark-img');
      const wave = document.getElementById('sound-wave');

      try {
        const r = await fetch('/api/speak', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        const data = await r.json();
        if (data.audio) {
          const audio = new Audio('data:audio/mp3;base64,' + data.audio);
          img.classList.add('speaking');
          wave.classList.add('active');
          audio.play();
          audio.onended = () => {
            img.classList.remove('speaking');
            wave.classList.remove('active');
          };
        }
      } catch (e) {
        img.classList.remove('speaking');
        wave.classList.remove('active');
      }
    }

    // ==================== STT (microfone) ====================
    let recognition = null;
    let isListening = false;

    function toggleMic() {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        showToast('⚠️ Seu navegador não suporta microfone. Use Chrome.');
        return;
      }

      if (isListening) {
        recognition.stop();
        return;
      }

      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'pt-BR';
      recognition.continuous = false;
      recognition.interimResults = false;

      recognition.onstart = () => {
        isListening = true;
        document.getElementById('mic-btn').classList.add('listening');
        document.getElementById('user-input').placeholder = '🎙️ Ouvindo...';
      };

      recognition.onresult = (e) => {
        const transcript = e.results[0][0].transcript;
        document.getElementById('user-input').value = transcript;
        autoResize(document.getElementById('user-input'));
      };

      recognition.onend = () => {
        isListening = false;
        document.getElementById('mic-btn').classList.remove('listening');
        document.getElementById('user-input').placeholder = 'Digite sua mensagem ou clique no microfone...';
        // Auto send after voice
        setTimeout(() => {
          if (document.getElementById('user-input').value.trim()) {
            sendMessage();
          }
        }, 400);
      };

      recognition.onerror = (e) => {
        isListening = false;
        document.getElementById('mic-btn').classList.remove('listening');
        document.getElementById('user-input').placeholder = 'Digite sua mensagem ou clique no microfone...';
        if (e.error !== 'aborted') showToast('Erro no microfone: ' + e.error);
      };

      recognition.start();
    }

    // ==================== QUICK ACTIONS ====================
    function quickHelp(text) {
      document.getElementById('user-input').value = text;
      sendMessage();
    }

    function suggestProject() {
      const topics = [
        'me sugira um projeto de desenvolvimento web criativo que eu possa construir para praticar React e Node.js',
        'me dê uma ideia de projeto fullstack inovadora que possa impressionar em portfólio',
        'sugira um projeto web com tema interessante para eu praticar JavaScript puro',
        'me dê uma ideia de projeto usando API pública que seja útil e divertido de construir'
      ];
      const pick = topics[Math.floor(Math.random() * topics.length)];
      quickHelp(pick);
    }

    async function resetChat() {
      if (!confirm('Resetar a memória do C.L.A.R.K.?')) return;
      await fetch('/api/reset', { method: 'POST' });
      document.getElementById('chat-messages').innerHTML = `
    <div class="welcome-msg">
      <h2>⚡ MEMÓRIA RESETADA ⚡</h2>
      Nova sessão iniciada, chefe.<br>
      <span style="color:rgba(255,45,120,0.5)">[ MODO: ASSISTENTE DE PROGRAMAÇÃO ]</span>
    </div>`;
      showToast('Memória resetada com sucesso.');
    }

    // ==================== TOAST ====================
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ==================== INIT ====================
    window.onload = () => {
      setTimeout(() => {
        quickHelp('Olá C.L.A.R.K.! Apresente-se brevemente e me diga como você pode me ajudar a evoluir como programador.');
      }, 800);
    };
  </script>
</body>
